<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 130" width="1200" height="130" role="img" aria-label="">
  <defs>
    <linearGradient id="fbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#cbd5e1"/>
      <stop offset="55%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <pattern id="fgrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#475569" stroke-opacity="0.1" stroke-width="1"/>
    </pattern>
  </defs>

  <rect x="0" y="0" width="1200" height="4" fill="#0284c7" fill-opacity="0.3"/>
  <rect y="4" width="1200" height="126" fill="url(#fbg)"/>
  <rect y="4" width="1200" height="126" fill="url(#fgrid)"/>

  <g fill="#0284c7">
    <circle cx="300" cy="70" r="2.5">
      <animate attributeName="fill-opacity" values="0.15;0.9;0.15" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="70" r="2.5">
      <animate attributeName="fill-opacity" values="0.15;0.9;0.15" dur="4s" begin="1.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="900" cy="70" r="2.5">
      <animate attributeName="fill-opacity" values="0.15;0.9;0.15" dur="4s" begin="2.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g stroke="#0284c7" stroke-opacity="0.25" stroke-width="1.5">
    <line x1="300" y1="70" x2="600" y2="70"/>
    <line x1="600" y1="70" x2="900" y2="70"/>
  </g>

  <text x="600" y="108" text-anchor="middle" font-family="'Segoe UI',system-ui,-apple-system,sans-serif" font-size="12" font-weight="500" fill="#64748b" letter-spacing="3">DETERMINISM · ZERO-BLOAT · LEVERAGE</text>
</svg>
