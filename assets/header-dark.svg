<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 220" width="1200" height="220" role="img" aria-label="Matheus Trindade — Software Architect, Product Engineer, Business Operator">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="55%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#38bdf8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#64748b" stroke-opacity="0.14" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="220" fill="url(#bg)"/>
  <rect width="1200" height="220" fill="url(#grid)"/>

  <rect x="-400" y="0" width="400" height="220" fill="url(#sweep)">
    <animate attributeName="x" values="-400;1200" dur="7s" repeatCount="indefinite"/>
  </rect>

  <g font-family="'Segoe UI',system-ui,-apple-system,'Helvetica Neue',sans-serif">
    <text x="600" y="98" text-anchor="middle" font-size="54" font-weight="700" fill="#e2e8f0" letter-spacing="1.5">Matheus Trindade</text>
    <text x="600" y="136" text-anchor="middle" font-size="15" font-weight="500" fill="#94a3b8" letter-spacing="3.5">SOFTWARE ARCHITECT · PRODUCT ENGINEER · BUSINESS OPERATOR</text>
  </g>

  <g stroke="#38bdf8" stroke-width="2" stroke-linecap="round">
    <line x1="480" y1="164" x2="720" y2="164" stroke-opacity="0.35"/>
  </g>

  <circle cx="480" cy="164" r="3.5" fill="#38bdf8">
    <animate attributeName="cx" values="480;720;480" dur="6s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.2 1;0.4 0 0.2 1"/>
    <animate attributeName="fill-opacity" values="0.2;1;0.2" dur="6s" repeatCount="indefinite"/>
  </circle>

  <rect x="0" y="216" width="1200" height="4" fill="#38bdf8" fill-opacity="0.3"/>
</svg>
